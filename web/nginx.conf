server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # Static JS, CSS, and HTML — no-cache so container rebuilds are always
    # picked up immediately without a hard-refresh.
    location ~* \.(js|css|html)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma        "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Graph data — never cache; the analyzer writes a fresh file each run.
    location /data/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Everything else — SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
