<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900 text-white overflow-hidden">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plugin Profiler</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Prism.js (syntax highlighting) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-php.min.js" defer></script>

  <!-- Cytoscape.js + layout plugins -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.33.1/dist/cytoscape.min.js"></script>
  <!-- dagre: hierarchical layout for directed graphs -->
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <!-- fCoSE peer deps: layout-base → cose-base must load before cytoscape-fcose -->
  <script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
  <!-- fCoSE: fast compound spring embedder — best default for mixed plugin graphs -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.min.js"></script>
  <!-- expand-collapse: collapse/expand compound namespace and directory groups -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-expand-collapse@4.1.1/cytoscape-expand-collapse.js"></script>
  <script>
    // Expose layout plugins to graph.js (loaded as ES module, no access to globals otherwise)
    window.cytoscapeDagre          = cytoscapeDagre;
    window.cytoscapeFcose          = cytoscapeFcose;
    window.cytoscapeExpandCollapse = cytoscapeExpandCollapse;
  </script>

  <style>
    #cy {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
    }
    #sidebar {
      width: 400px;
      min-width: 320px;
      max-width: 500px;
      overflow-y: auto;
    }
    .type-filter-btn.opacity-30 {
      opacity: 0.3;
    }
    /* Visually-hidden helper — content for screen readers only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
</head>
<body class="h-full w-full flex flex-col overflow-hidden">

  <!-- Skip navigation link — visible on keyboard focus, hidden otherwise -->
  <a href="#main-content"
     class="sr-only focus:not-sr-only focus:fixed focus:top-0 focus:left-0 focus:z-[1000] focus:bg-blue-600 focus:text-white focus:px-4 focus:py-2 focus:rounded-br focus:text-sm focus:outline-none">
    Skip to main content
  </a>

  <!-- Loading overlay — shown while data is fetched and graph is built -->
  <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-900 transition-opacity duration-300">
    <div class="flex flex-col items-center gap-4">
      <svg class="animate-spin h-10 w-10 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <p id="loading-status" role="status" aria-live="polite" class="text-gray-400 text-sm tracking-wide">Loading graph data…</p>
    </div>
  </div>

  <!-- Toolbar -->
  <header class="bg-gray-800 border-b border-gray-700 flex flex-col shrink-0">
  <!-- Page title — visually hidden but announces the app to screen readers -->
  <h1 class="sr-only">Plugin Profiler</h1>
  <div class="h-12 flex items-center gap-3 px-4 overflow-x-auto">
    <div class="flex items-center gap-2 mr-2 shrink-0">
      <span class="text-pink-400 font-bold text-sm">&#x25CE;</span>
      <div class="flex flex-col leading-tight min-w-0">
        <div class="flex items-center gap-1">
          <span id="plugin-name" class="font-semibold text-sm truncate max-w-[180px]">Plugin Profiler</span>
          <span id="plugin-version" class="text-gray-400 text-xs shrink-0"></span>
          <button id="reanalyze-btn" class="hidden text-slate-400 hover:text-white text-sm leading-none focus:outline-none focus:ring-2 focus:ring-blue-400 rounded" title="Re-analyze a different path" aria-label="Re-analyze plugin" aria-expanded="false" aria-controls="reanalyze-panel">↻</button>
        </div>
        <span id="plugin-path" class="hidden text-[10px] text-slate-400 font-mono truncate max-w-[260px]" title="Analyzed plugin path"></span>
      </div>
    </div>

    <!-- Search -->
    <div class="relative">
      <input
        id="search-input"
        type="search"
        list="node-labels"
        placeholder="Search nodes… (/)"
        aria-label="Search nodes"
        class="bg-gray-700 text-white placeholder-gray-400 rounded px-3 py-1 text-sm w-52 focus:outline-none focus:ring-2 focus:ring-blue-400"
        autocomplete="off"
      />
      <datalist id="node-labels"></datalist>
    </div>

    <div class="ml-auto flex items-center gap-2 shrink-0">
      <!-- Stats -->
      <span id="plugin-stats" class="text-gray-400 text-xs"></span>

      <!-- Layout -->
      <label for="layout-select" class="sr-only">Layout algorithm</label>
      <select
        id="layout-select"
        aria-label="Layout algorithm"
        class="bg-gray-700 text-white text-xs rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
        <option value="dagre">Dagre (hierarchy)</option>
        <option value="fcose" selected>fCoSE (force)</option>
        <option value="breadthfirst">Breadth-first</option>
        <option value="grid">Grid</option>
      </select>

      <!-- View mode: All / Requirements / Data flow -->
      <div
        id="view-mode-btns"
        class="flex rounded overflow-hidden border border-gray-600 text-xs"
        role="toolbar"
        aria-label="Edge view mode"
      >
        <button
          data-view="all"
          class="view-mode-btn px-2 py-1 bg-blue-600 text-white focus:outline-none focus:ring-2 focus:ring-white focus:ring-inset"
          title="Show all relationship edges"
          aria-pressed="true"
        >All</button>
        <button
          data-view="requirements"
          class="view-mode-btn px-2 py-1 bg-gray-700 text-blue-300 hover:bg-gray-600 hover:text-blue-200 border-l border-gray-600 focus:outline-none focus:ring-2 focus:ring-white focus:ring-inset"
          title="Structural edges: inheritance, composition, function calls, file includes — what the code requires to load"
          aria-pressed="false"
        >Requirements</button>
        <button
          data-view="data"
          class="view-mode-btn px-2 py-1 bg-gray-700 text-orange-300 hover:bg-gray-600 hover:text-orange-200 border-l border-gray-600 focus:outline-none focus:ring-2 focus:ring-white focus:ring-inset"
          title="Runtime edges: hooks, DB reads/writes, REST, AJAX, HTTP — what the plugin does at runtime"
          aria-pressed="false"
        >Data flow</button>
        <button
          data-view="web"
          class="view-mode-btn px-2 py-1 bg-gray-700 text-cyan-300 hover:bg-gray-600 hover:text-cyan-200 border-l border-gray-600 focus:outline-none focus:ring-2 focus:ring-white focus:ring-inset"
          title="Web surface: blocks, scripts, shortcodes, admin pages, REST/AJAX endpoints, JS→PHP calls — what users interact with"
          aria-pressed="false"
        >Web</button>
      </div>

      <!-- Collapse/Expand all namespace groups -->
      <button id="collapse-btn" class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400" title="Collapse / Expand all groups" aria-pressed="false">⊟ Groups</button>

      <!-- Focus / Show-all toggle -->
      <button id="focus-btn" class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400" title="Toggle between key nodes and full graph" aria-pressed="true"><span id="focus-label">⊙ Key nodes</span></button>

      <!-- Library filter: hide bundled third-party code -->
      <button id="lib-filter-btn" class="hidden text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400" title="Show or hide bundled library code" aria-pressed="false"><span id="lib-filter-label">⚙ Dev only</span></button>

      <!-- Circular dependency cycles badge — hidden when no cycles detected -->
      <button id="cycles-btn" class="hidden text-red-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-red-400" aria-expanded="false" aria-controls="cycles-panel" title="Circular dependencies detected — click to highlight"><span id="cycles-label">⟳ Cycles</span></button>

      <!-- Edge legend toggle -->
      <button id="legend-btn" class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400" aria-expanded="false" aria-controls="legend-panel">Legend</button>

      <!-- Zoom controls -->
      <button id="zoom-in"  class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" title="Zoom In" aria-label="Zoom in">+</button>
      <button id="zoom-out" class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" title="Zoom Out" aria-label="Zoom out">−</button>
      <button id="zoom-fit" class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400" title="Fit (F)" aria-label="Fit graph (F)">Fit</button>
    </div>
  </div>
  <!-- Type filter buttons — second row, shown after graph loads -->
  <div id="type-filters" class="hidden flex-wrap gap-1 px-4 py-1.5 border-t border-gray-700 overflow-x-auto"></div>
  </header>

  <!-- Re-analyze panel — hidden by default, shown when ↻ is clicked -->
  <div id="reanalyze-panel"
       role="dialog"
       aria-modal="true"
       aria-label="Re-analyze plugin"
       class="hidden fixed top-12 left-1/2 -translate-x-1/2 z-[300] bg-slate-800 border border-slate-600 rounded-lg shadow-xl p-3 flex items-center gap-2 w-[540px]">
    <label for="reanalyze-path" class="sr-only">Plugin path to analyze</label>
    <input id="reanalyze-path" type="text" placeholder="/absolute/path/to/plugin"
      aria-describedby="reanalyze-status"
      class="flex-1 bg-slate-900 border border-slate-600 rounded px-3 py-1.5 text-sm text-slate-200 font-mono focus:outline-none focus:ring-2 focus:ring-blue-400" />
    <button id="reanalyze-submit" class="px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium shrink-0 focus:outline-none focus:ring-2 focus:ring-blue-400">Analyze</button>
    <button id="reanalyze-cancel" class="px-2 py-1.5 text-slate-400 hover:text-white text-sm leading-none shrink-0 focus:outline-none focus:ring-2 focus:ring-blue-400" aria-label="Cancel re-analysis">✕</button>
    <span id="reanalyze-status" role="status" aria-live="polite" class="hidden text-xs text-slate-400 shrink-0"></span>
  </div>

  <!-- Edge legend panel — toggled by the Legend button -->
  <div id="legend-panel"
       role="region"
       aria-label="Edge type legend"
       class="hidden fixed top-12 right-4 z-[200] bg-slate-800/95 backdrop-blur border border-slate-600 rounded-lg shadow-xl p-3 max-h-[60vh] overflow-y-auto w-64">
    <div id="legend-content"></div>
  </div>

  <!-- Cycles panel — lists detected circular dependencies -->
  <div id="cycles-panel"
       role="region"
       aria-label="Circular dependency cycles"
       class="hidden fixed top-12 right-4 z-[200] bg-slate-800/95 backdrop-blur border border-red-800/50 rounded-lg shadow-xl p-3 max-h-[60vh] overflow-y-auto w-80">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs font-semibold text-red-400 uppercase tracking-wider">Circular Dependencies</span>
      <button id="cycles-panel-close" class="text-slate-400 hover:text-white text-sm" aria-label="Close cycles panel">&#x2715;</button>
    </div>
    <div id="cycles-content"></div>
  </div>

  <!-- Live region for filter state announcements (screen readers) -->
  <div id="filter-announce" class="sr-only" aria-live="polite"></div>

  <!-- Main layout (always in DOM so Cytoscape can size itself) -->
  <main id="main-content" class="flex-1 flex min-h-0">
    <!-- Graph canvas -->
    <div id="cy" role="application" aria-label="Plugin dependency graph" class="flex-1 bg-gray-950" tabindex="0"></div>

    <!-- Sidebar -->
    <aside
      id="sidebar"
      aria-label="Node inspector"
      aria-hidden="true"
      class="hidden flex-col bg-gray-800 border-l border-gray-700 p-4 overflow-y-auto text-sm"
    ></aside>
  </main>

  <!-- Keyboard shortcut hint -->
  <footer class="h-6 bg-gray-800 border-t border-gray-700 flex items-center px-4 text-gray-400 text-xs shrink-0" aria-label="Keyboard shortcuts">
    <kbd aria-label="forward slash">/</kbd>&nbsp;search &nbsp;·&nbsp; <kbd>F</kbd>&nbsp;fit &nbsp;·&nbsp; <kbd>Esc</kbd>&nbsp;close sidebar &nbsp;·&nbsp; <kbd>1–9</kbd>&nbsp;toggle types &nbsp;·&nbsp; double-click node to zoom
  </footer>

  <!-- App entry point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
