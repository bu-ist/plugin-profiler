<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900 text-white overflow-hidden">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plugin Profiler</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Prism.js (syntax highlighting) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-php.min.js" defer></script>

  <!-- Cytoscape.js + layout plugins -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.33.1/dist/cytoscape.min.js"></script>
  <!-- dagre: hierarchical layout for directed graphs -->
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <!-- fCoSE peer deps: layout-base → cose-base must load before cytoscape-fcose -->
  <script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
  <!-- fCoSE: fast compound spring embedder — best default for mixed plugin graphs -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.min.js"></script>
  <!-- expand-collapse: collapse/expand compound namespace and directory groups -->
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-expand-collapse@4.1.1/cytoscape-expand-collapse.js"></script>
  <script>
    // Expose layout plugins to graph.js (loaded as ES module, no access to globals otherwise)
    window.cytoscapeDagre          = cytoscapeDagre;
    window.cytoscapeFcose          = cytoscapeFcose;
    window.cytoscapeExpandCollapse = cytoscapeExpandCollapse;
  </script>

  <style>
    #cy {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
    }
    #sidebar {
      width: 400px;
      min-width: 320px;
      max-width: 500px;
      overflow-y: auto;
    }
    .type-filter-btn.opacity-30 {
      opacity: 0.3;
    }
  </style>
</head>
<body class="h-full w-full flex flex-col overflow-hidden">

  <!-- Loading overlay — shown while data is fetched and graph is built -->
  <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-900 transition-opacity duration-300">
    <div class="flex flex-col items-center gap-4">
      <svg class="animate-spin h-10 w-10 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <p id="loading-status" class="text-gray-400 text-sm tracking-wide">Loading graph data…</p>
    </div>
  </div>

  <!-- Toolbar -->
  <header class="h-12 bg-gray-800 border-b border-gray-700 flex items-center gap-3 px-4 shrink-0">
    <div class="flex items-center gap-2 mr-2 shrink-0">
      <span class="text-pink-400 font-bold text-sm">&#x25CE;</span>
      <span id="plugin-name" class="font-semibold text-sm truncate max-w-[180px]">Plugin Profiler</span>
      <span id="plugin-version" class="text-gray-400 text-xs"></span>
    </div>

    <!-- Search -->
    <div class="relative">
      <input
        id="search-input"
        type="search"
        list="node-labels"
        placeholder="Search nodes… (/)"
        class="bg-gray-700 text-white placeholder-gray-400 rounded px-3 py-1 text-sm w-52 focus:outline-none focus:ring-1 focus:ring-blue-500"
        autocomplete="off"
      />
      <datalist id="node-labels"></datalist>
    </div>

    <!-- Type filters -->
    <div id="type-filters" class="flex flex-wrap gap-1 min-w-0 overflow-hidden"></div>

    <div class="ml-auto flex items-center gap-2 shrink-0">
      <!-- Stats -->
      <span id="plugin-stats" class="text-gray-400 text-xs"></span>

      <!-- Layout -->
      <select
        id="layout-select"
        class="bg-gray-700 text-white text-xs rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500"
      >
        <option value="dagre">Dagre (hierarchy)</option>
        <option value="fcose" selected>fCoSE (force)</option>
        <option value="breadthfirst">Breadth-first</option>
        <option value="grid">Grid</option>
      </select>

      <!-- View mode: All / Requirements / Data flow -->
      <div id="view-mode-btns" class="flex rounded overflow-hidden border border-gray-600 text-xs">
        <button data-view="all"          class="view-mode-btn px-2 py-1 bg-blue-600 text-white" title="Show all relationship edges">All</button>
        <button data-view="requirements" class="view-mode-btn px-2 py-1 bg-gray-700 text-gray-400 hover:bg-gray-600 hover:text-white border-l border-gray-600" title="Code-dependency edges: inheritance, composition, file includes">Requirements</button>
        <button data-view="data"         class="view-mode-btn px-2 py-1 bg-gray-700 text-gray-400 hover:bg-gray-600 hover:text-white border-l border-gray-600" title="Data-flow edges: hooks, DB reads/writes, REST calls, AJAX">Data flow</button>
      </div>

      <!-- Collapse/Expand all namespace groups -->
      <button id="collapse-btn" class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs" title="Collapse / Expand all groups">⊟ Groups</button>

      <!-- Focus / Show-all toggle -->
      <button id="focus-btn" class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs" title="Toggle between key nodes and full graph"><span id="focus-label">⊙ Key nodes</span></button>

      <!-- Library filter: hide bundled third-party code -->
      <button id="lib-filter-btn" class="hidden text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs" title="Show or hide bundled library code"><span id="lib-filter-label">⚙ Dev only</span></button>

      <!-- Zoom controls -->
      <button id="zoom-in"  class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-sm" title="Zoom In">+</button>
      <button id="zoom-out" class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-sm" title="Zoom Out">−</button>
      <button id="zoom-fit" class="text-gray-300 hover:text-white bg-gray-700 rounded px-2 py-1 text-xs" title="Fit (F)">Fit</button>
    </div>
  </header>

  <!-- Main layout (always in DOM so Cytoscape can size itself) -->
  <div id="main-layout" class="flex-1 flex min-h-0">
    <!-- Graph canvas -->
    <div id="cy" class="flex-1 bg-gray-950"></div>

    <!-- Sidebar -->
    <aside
      id="sidebar"
      class="hidden flex-col bg-gray-800 border-l border-gray-700 p-4 overflow-y-auto text-sm"
    ></aside>
  </div>

  <!-- Keyboard shortcut hint -->
  <footer class="h-6 bg-gray-800 border-t border-gray-700 flex items-center px-4 text-gray-500 text-xs shrink-0">
    <kbd>/</kbd>&nbsp;search &nbsp;·&nbsp; <kbd>F</kbd>&nbsp;fit &nbsp;·&nbsp; <kbd>Esc</kbd>&nbsp;close sidebar &nbsp;·&nbsp; <kbd>1-9</kbd>&nbsp;toggle types &nbsp;·&nbsp; double-click node to zoom
  </footer>

  <!-- App entry point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
