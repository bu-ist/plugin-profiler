services:
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
      target: base
    volumes:
      - ${PLUGIN_PATH:-./sample-plugin}:/plugin:ro
      - output:/output
    environment:
      # LLM_PROVIDER defaults to ollama. The ollama container only starts with
      # --profile llm; the analyzer will print a clear error if it is unreachable.
      # Switch to claude / openai / gemini and set LLM_API_KEY for external APIs.
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5-coder:7b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - LLM_BATCH_SIZE=${LLM_BATCH_SIZE:-25}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-120}

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${PORT:-9000}:80"
    volumes:
      - output:/usr/share/nginx/html/data:ro

  # Ollama only starts when you explicitly request the llm profile:
  #   docker compose --profile llm up -d ollama
  # Pre-pull the model before first use to avoid timeout during analysis:
  #   docker compose --profile llm run --rm ollama ollama pull qwen2.5-coder:7b
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    profiles:
      - llm

volumes:
  output:
  ollama_models:
